spring:
  datasource:
    url: jdbc:h2:mem:campaigndb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  campaign:
    min-bid-amount: 0.01
    initial-account-balance: 10000.00